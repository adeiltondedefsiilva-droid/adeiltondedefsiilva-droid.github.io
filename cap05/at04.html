<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>
</head>
<body>

  <header>
    <h1>Inscrição — Semana de Tecnologia IFAL</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>
    <form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">

      <fieldset>
        <legend>Identificação do Participante</legend>

        <label for="nome">Nome completo:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="email">E-mail institucional:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="cidade">Cidade de origem:</label><br>
        <input type="text" id="cidade" name="cidade" list="cidades"><br>
        <datalist id="cidades">
          <option value="Maceió">
          <option value="Arapiraca">
          <option value="Palmeira dos Índios">
          <option value="Rio Largo">
          <option value="Penedo">
          <option value="União dos Palmares">
          <option value="São Miguel dos Campos">
          <option value="Delmiro Gouveia">
        </datalist><br>

        <label for="foto">Foto para crachá:</label><br>
        <input type="file" id="foto" name="foto" accept="image/jpeg,image/png"
          aria-describedby="info-foto"><br>
        <small id="info-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small><br><br>

      </fieldset><br>

      <fieldset>
        <legend>Preferências para o Evento</legend>

        <label for="chegada">Data e hora preferida para chegada:</label><br>
        <input type="datetime-local" id="chegada" name="chegada"><br><br>

        <label for="experiencia">
          Nível de experiência em programação: <span id="valor-experiencia">5</span>/10
        </label><br>
        <input type="range" id="experiencia" name="experiencia"
          min="0" max="10" step="1" value="5"
          oninput="document.getElementById('valor-experiencia').textContent = this.value"><br><br>

        <label for="cor_camiseta">Cor de preferência para a camiseta:</label><br>
        <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8"><br><br>

        <label for="oficinas">Oficinas de interesse:</label><br>
        <select id="oficinas" name="oficinas[]" multiple size="4"
          aria-describedby="info-oficinas">
          <option value="html">HTML e CSS</option>
          <option value="js">JavaScript</option>
          <option value="python">Python</option>
          <option value="banco">Banco de Dados</option>
          <option value="ia">Inteligência Artificial</option>
        </select><br>
        <small id="info-oficinas">Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.</small><br><br>

      </fieldset><br>

      <input type="hidden" name="edicao" value="2026">

      <button type="submit">Confirmar inscrição</button>

    </form>
  </main>

</body>
</html>
